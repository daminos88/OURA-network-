name: Runtime Structure Check

on:
  push:
  pull_request:

jobs:
  check-runtime-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate expected runtime files if present
        run: |
          set -euo pipefail

          missing=0

          check_group() {
            group_name="$1"
            shift
            echo "Checking $group_name"
            local_found=1
            for file in "$@"; do
              if [ -f "$file" ]; then
                echo "Found: $file"
                local_found=0
              else
                echo "Missing: $file"
                missing=1
              fi
            done
            return $local_found
          }

          if [ -d "oura_dart" ]; then
            check_group "Flutter runtime" \
              "oura_dart/lib/oura_engine.dart" \
              "oura_dart/lib/oura_bundle_verifier.dart" \
              "oura_dart/lib/oura_evaluator.dart" \
              "oura_dart/lib/oura_errors.dart" \
              "oura_dart/lib/oura_types.dart"
          else
            echo "Flutter runtime not present on this ref yet."
          fi

          if [ -d "oura_react_native" ]; then
            check_group "React Native runtime" \
              "oura_react_native/src/OuraEngine.ts" \
              "oura_react_native/src/bundle.ts" \
              "oura_react_native/src/cache.ts" \
              "oura_react_native/src/types.ts" \
              "oura_react_native/package.json" \
              "oura_react_native/tsconfig.json"
          else
            echo "React Native runtime not present on this ref yet."
          fi

          if [ "$missing" -ne 0 ]; then
            echo "Runtime structure check failed."
            exit 1
          fi

          echo "Runtime structure check passed."

      - name: Note pending fixture-backed crypto validation
        run: |
          echo "Real Ed25519 verification and fixture-backed parity remain pending until shared fixtures are added to the repo."