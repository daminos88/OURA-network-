name: Repo Structure Validation

on:
  push:
  pull_request:

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate expected runtime files
        run: |
          set -euo pipefail

          required_files=(
            ".github/workflows/repo-structure.yml"
            "README.md"
          )

          missing=0
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              missing=1
            else
              echo "Found: $file"
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Repository structure validation failed."
            exit 1
          fi

          echo "Repository structure validation passed."

      - name: Note pending fixture-backed crypto validation
        run: |
          echo "Runtime structure exists in open PR branches."
          echo "Fixture-backed cryptographic validation remains pending until shared fixtures are added to the repo."